<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Worksheet Maker</title>
<style>
:root{--bg:#f7f5f1;--card:#fff;--bdr:#ddd8d0;--txt:#2c2825;--mut:#8a8580;--acc:#c8a96e;--dk:#2c2825}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* Header */
.hdr{background:var(--dk);color:#f5f0e8;padding:14px 20px;border-bottom:3px solid var(--acc);display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:20px;letter-spacing:2px;font-weight:700}
.hdr small{font-size:11px;color:#a09888;display:block;margin-top:2px}
.wrap{max-width:1100px;margin:0 auto;padding:20px 14px}

/* Buttons */
.b{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;font-family:inherit}
.b-dk{background:var(--dk);color:#f5f0e8}.b-dk:hover{background:#1a1815}
.b-gd{background:var(--acc);color:var(--dk);font-weight:600}.b-gd:hover{background:#b8994e}
.b-lt{background:#f0ece6;color:#4a4540;border:1px solid var(--bdr)}.b-lt:hover{background:#e8e3db}
.b-on{background:var(--dk);color:#f5f0e8;border:1px solid var(--dk)}
.b-off{background:#f0ece6;color:#4a4540;border:1px solid var(--bdr)}

/* Upload */
.upload-box{max-width:600px;margin:30px auto;text-align:center}
.drop{border:2.5px dashed var(--bdr);border-radius:14px;padding:40px 20px;cursor:pointer;background:#fdfcfa;transition:all .15s}
.drop:hover,.drop.over{border-color:var(--acc);background:#faf6ee}
.drop h2{font-size:17px;margin:8px 0 4px}
.drop p{font-size:13px;color:#6a6560}
.methods{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.meth{padding:12px;border-radius:10px;background:#f8f6f2;border:1px solid #e8e4de;text-align:center;min-width:100px;flex:1}
.meth.blue{border-color:#4a9eff;background:#f0f7ff;cursor:pointer}
.meth .mi{font-size:22px;margin-bottom:3px}
.meth .ml{font-size:11px;font-weight:600}
.meth .md{font-size:9px;color:var(--mut);margin-top:1px}
.err{margin-top:12px;padding:10px 14px;background:#fef2f2;border:1px solid #fcc;border-radius:6px;color:#900;font-size:12px;text-align:center}

/* Toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:10px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;margin-bottom:12px}
.toolbar .lbl{font-size:10px;color:var(--mut);letter-spacing:1px;margin-right:2px}
.sep{width:1px;height:18px;background:var(--bdr);margin:0 3px}

/* Edit Table */
.ecard{background:var(--card);border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.et{width:100%;border-collapse:collapse}
.et th{padding:8px 5px;font-size:10px;color:var(--mut);font-weight:500;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap}
.et td{padding:6px 4px;border-bottom:1px solid #eee}
.et input{width:100%;border:none;background:none;outline:none;font-size:12px;padding:3px 0;color:var(--txt)}
.et input.bld{font-weight:700}
.et input.ita{font-style:italic;color:var(--mut)}
.et input.sml{font-size:11px}
.et select{border:none;background:none;font-size:11px;color:var(--mut);cursor:pointer;outline:none}
.xb{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 2px}.xb:hover{color:#c44}
.add-r{padding:10px;border-top:1px solid #eee}

/* Preview */
.pvw{background:var(--card);padding:24px;border:1px solid var(--bdr);border-radius:6px;max-width:960px;margin:0 auto}
.pvt{text-align:center;margin-bottom:14px}
.pvt h2{font-size:16px;font-weight:700}
.pvt .nl{font-size:12px;color:#444;margin-top:8px}
.pvt .ins{font-size:11px;color:#555;margin-top:4px}
.pv{width:100%;border-collapse:collapse}
.pv th{padding:6px 4px;font-size:10px;font-weight:700;text-align:center;border:1.5px solid #999;background:#f0f0f0}
.pv td{border:1px solid #bbb;vertical-align:middle}
.pv .cn{padding:6px 3px;text-align:center;color:#999;font-size:10px;width:24px}
.pv .ce{padding:12px 5px;height:44px;font-size:12px}
.pv .cp{padding:6px 3px;text-align:center;font-style:italic;color:#999;font-size:10px;width:24px}
.pv .cd{padding:12px 5px;font-size:10px;line-height:1.5;height:44px}
.pv .ck{padding:12px 5px;text-align:center;height:44px;font-size:12px;min-width:105px}
.pv .cs{padding:6px 3px;text-align:center;font-style:italic;color:#999;font-size:10px;width:60px}
.bl{display:inline-block;border-bottom:2.5px solid #333;min-height:26px;vertical-align:bottom}

/* QR Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center}
.mdl{background:#fff;border-radius:14px;padding:24px;text-align:center;max-width:380px;width:92%;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.mdl h3{font-size:16px;margin-bottom:4px}
.mdl .ds{font-size:12px;color:#666;margin-bottom:14px;line-height:1.5}
#qr-box{display:inline-block;padding:8px;background:#fff;border-radius:6px;margin-bottom:10px;min-width:200px;min-height:200px}
.sbdg{display:inline-block;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500}
.sbdg.w{background:#fef9e7;color:#8a6d00}
.sbdg.g{background:#e8f8e8;color:#2d7a2d}
.ucopy{margin-top:8px;padding:7px 10px;background:#f5f3f0;border-radius:5px;font-size:9px;color:#888;word-break:break-all;cursor:pointer;border:1px solid #e8e4de}
.ucopy:active{background:#e8f8e8}

/* Mobile */
.mobp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#e8f0ff,#f0f7ff)}
.mobc{background:#fff;border-radius:18px;padding:26px 20px;text-align:center;max-width:350px;width:100%;box-shadow:0 6px 24px rgba(0,0,0,.1)}
.mobc h2{font-size:18px;margin-bottom:6px}
.mobc p{font-size:13px;color:#666;margin-bottom:18px}
.mbtn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;font-family:inherit}
.mbtn.cam{background:#4a9eff;color:#fff}
.mbtn.gal{background:#f0f0f0;color:#333}
.mbtn.solo{background:#c8a96e;color:#2c2825}
.mst{margin-top:12px;padding:10px;border-radius:8px;font-size:13px}
.mst.w{background:#fef9e7;color:#8a6d00}
.mst.g{background:#e8f8e8;color:#2d7a2d}
.mst.s{background:#e8f0ff;color:#2a5aaa}
.mst.d{background:#e8f8e8;color:#2d7a2d}
.mst.e{background:#fef2f2;color:#9b2c2c}
.mimg{max-width:100%;max-height:160px;border-radius:6px;margin-top:8px}
.mlog{margin-top:8px;padding:8px;background:#f8f8f8;border-radius:6px;font-size:10px;color:#888;text-align:left;max-height:120px;overflow-y:auto;font-family:monospace}

.footer{text-align:center;padding:20px 0 8px;font-size:9px;color:#c0b8a8;letter-spacing:2px}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .8s linear infinite;display:inline-block}
@media print{
  body{background:#fff!important}.no-print{display:none!important}
  .pvw{border:none;padding:0}
  .pv .ce,.pv .cd,.pv .ck{height:48px;padding:14px 5px}
  .bl{min-height:28px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/*========================================
  DEMO DATA (오프라인 테스트용)
========================================*/
var DEMO=[
  {id:1,word:"shaded",phrase:"shaded terrace",pos:"a",def:"darker and cooler because something blocks direct light from the sun",kor:"그늘진",synonym:""},
  {id:2,word:"unattractive",phrase:"unattractive offer",pos:"a",def:"not pleasant; lacking good or positive features",kor:"매력 없는",synonym:"ugly"},
  {id:3,word:"admire",phrase:"admire a new car",pos:"v",def:"to feel respect or approval for someone or something",kor:"감탄하다",synonym:""},
  {id:4,word:"darken",phrase:"darken the room",pos:"v",def:"to become dark or darker",kor:"어둡게하다",synonym:""},
  {id:5,word:"relief",phrase:"sigh of relief",pos:"n",def:"a pleasant and relaxed feeling when something unpleasant stops",kor:"안도",synonym:""},
  {id:6,word:"paradise",phrase:"earthly paradise",pos:"n",def:"a place of great happiness where everything seems perfect",kor:"낙원",synonym:"heaven"},
];

/*========================================
  STATE
========================================*/
var S={
  view:'upload', words:[], title:'Vocabulary Worksheet',
  blanks:{word:true,kor:true,def:false},
  loading:false, error:null, shuffled:false,
  qrOpen:false, peerSt:'idle', peerId:null,
  apiKey:localStorage.getItem('vocabApiKey')||''
};
var _peer=null;

/*========================================
  UTILS
========================================*/
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=b[i];b[i]=b[j];b[j]=t}return b}
function toB64(f){return new Promise(function(ok,no){var r=new FileReader();r.onload=function(){ok(r.result.split(',')[1])};r.onerror=no;r.readAsDataURL(f)})}

// Detect mobile
function isMobile(){return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)}

/*========================================
  MOBILE MODE CHECK
========================================*/
var _conn=new URLSearchParams(location.search).get('connect');
var _peerLoaded=typeof Peer!=='undefined';
var _peerCallbacks=[];
function onPeerReady(fn){if(_peerLoaded)fn();else _peerCallbacks.push(fn)}
function _peerDone(){_peerLoaded=true;_peerCallbacks.forEach(function(f){f()});_peerCallbacks=[]}

if(_conn){
  document.addEventListener('DOMContentLoaded',function(){
    onPeerReady(function(){bootMobile(_conn)});
    setTimeout(function(){
      if(!_peerLoaded){
        var app=document.getElementById('app');
        if(app)app.innerHTML='<div style="padding:40px;text-align:center;color:red;font-size:16px">❌ PeerJS 로드 실패<br><br><small style="color:#666">인터넷 연결을 확인하고<br>페이지를 새로고침 해보세요</small><br><br><button onclick="location.reload()" style="padding:10px 20px;font-size:14px;border-radius:8px;border:none;background:#2c2825;color:white;cursor:pointer">🔄 새로고침</button></div>';
      }
    },10000);
  });
}else{
  // PC or standalone mobile: paste listener
  window.addEventListener('paste',function(e){
    if(S.view!=='upload'||S.loading)return;
    var fs=[];var items=e.clipboardData?e.clipboardData.items:[];
    for(var i=0;i<items.length;i++){if(items[i].kind==='file'){var f=items[i].getAsFile();if(f)fs.push(f)}}
    if(fs.length){e.preventDefault();handleFiles(fs)}
  });
  document.addEventListener('DOMContentLoaded',draw);
}

/*========================================
  MOBILE SENDER PAGE (QR로 접속 시)
========================================*/
function bootMobile(targetId){
  var app=document.getElementById('app');
  var logs=[];

  function addLog(msg){
    logs.push('['+new Date().toLocaleTimeString()+'] '+msg);
    var logEl=document.getElementById('mlog');
    if(logEl){logEl.textContent=logs.join('\n');logEl.scrollTop=logEl.scrollHeight}
  }

  app.innerHTML='<div class="mobp"><div class="mobc">'+
    '<div style="font-size:42px;margin-bottom:8px">📸</div>'+
    '<h2>사진 전송</h2><p>촬영하면 PC로 바로 전송됩니다</p>'+
    '<input type="file" id="mc" accept="image/*" capture="environment" style="display:none">'+
    '<input type="file" id="mg" accept="image/*,application/pdf" multiple style="display:none">'+
    '<button class="mbtn cam" id="camBtn">📷 카메라 촬영</button>'+
    '<button class="mbtn gal" id="galBtn">🖼️ 앨범 선택</button>'+
    '<hr style="margin:12px 0;border:none;border-top:1px solid #eee">'+
    '<button class="mbtn solo" id="soloBtn">📱 이 폰에서 직접 작업하기</button>'+
    '<div style="font-size:10px;color:#999;margin-top:4px">PC 전송 없이 여기서 바로 학습지 만들기</div>'+
    '<div id="ms" class="mst w">🔗 PC 연결 중...</div>'+
    '<div id="mp"></div>'+
    '<div id="mlog" class="mlog"></div>'+
  '</div></div>';

  function st(){return document.getElementById('ms')}
  var conn=null;
  var peerReady=false;

  // Solo mode: redirect to main page without connect param
  document.getElementById('soloBtn').onclick=function(){
    location.href=location.href.split('?')[0];
  };

  // Camera button
  document.getElementById('camBtn').onclick=function(){
    addLog('카메라 버튼 클릭');
    document.getElementById('mc').click();
  };

  // Gallery button
  document.getElementById('galBtn').onclick=function(){
    addLog('앨범 버튼 클릭');
    document.getElementById('mg').click();
  };

  addLog('PeerJS 로드 확인: ✅');

  addLog('Peer 생성 시도...');
  var p=new Peer();

  p.on('open',function(myId){
    addLog('내 Peer ID: '+myId);
    addLog('PC('+targetId+')에 연결 시도...');
    conn=p.connect(targetId,{reliable:true});

    conn.on('open',function(){
      peerReady=true;
      st().className='mst g';
      st().textContent='✅ PC 연결 완료! 사진을 찍으세요';
      addLog('✅ PC 연결 성공!');
    });

    conn.on('close',function(){
      peerReady=false;
      st().className='mst e';
      st().textContent='⚠️ PC 연결 끊김. QR을 다시 스캔하세요.';
      addLog('연결 닫힘');
    });

    conn.on('error',function(e){
      st().className='mst e';
      st().textContent='❌ 연결 실패: '+(e.message||e.type||'unknown');
      addLog('연결 에러: '+(e.message||e.type||JSON.stringify(e)));
    });
  });

  p.on('error',function(e){
    st().className='mst e';
    st().textContent='❌ 서버 연결 실패: '+(e.message||e.type);
    addLog('Peer 에러: '+(e.message||e.type||JSON.stringify(e)));
  });

  p.on('disconnected',function(){
    addLog('Peer 서버에서 연결 해제됨');
  });

  function send(file){
    addLog('send() 호출 - 파일: '+file.name+' ('+Math.round(file.size/1024)+'KB)');

    if(!conn||!conn.open){
      st().className='mst e';
      st().textContent='❌ PC와 연결이 안 되어 있습니다. QR을 다시 스캔하세요.';
      addLog('❌ 연결 없음 - conn:'+(conn?'있음':'null')+', open:'+(conn?conn.open:'N/A'));
      return;
    }
    st().className='mst s';st().textContent='📤 전송 중...';
    if(file.type.startsWith('image/')){
      document.getElementById('mp').innerHTML='<img src="'+URL.createObjectURL(file)+'" class="mimg">';
    }
    toB64(file).then(function(b64){
      addLog('Base64 변환 완료 ('+Math.round(b64.length/1024)+'KB)');
      var CS=180000,tot=Math.ceil(b64.length/CS);
      addLog('청크 수: '+tot);
      conn.send({t:'s',name:file.name,mime:file.type,tot:tot});
      var i=0;
      function next(){
        if(i>=tot){
          conn.send({t:'e'});
          st().className='mst d';st().textContent='✅ 전송 완료! 추가 전송도 가능합니다';
          addLog('✅ 전송 완료');
          return;
        }
        conn.send({t:'c',i:i,d:b64.slice(i*CS,(i+1)*CS)});
        i++;
        var pct=Math.round(i/tot*100);
        st().textContent='📤 전송 중... '+pct+'%';
        setTimeout(next,30);
      }
      next();
    }).catch(function(e){
      st().className='mst e';st().textContent='❌ 파일 읽기 실패';
      addLog('❌ 파일 읽기 실패: '+(e.message||e));
    });
  }

  // File input handlers - use addEventListener for better mobile compatibility
  document.getElementById('mc').addEventListener('change',function(e){
    addLog('카메라 change 이벤트 발생, files: '+(e.target.files?e.target.files.length:0));
    if(e.target.files&&e.target.files[0]){
      send(e.target.files[0]);
    }
    // Reset so same file can be selected again
    e.target.value='';
  });

  document.getElementById('mg').addEventListener('change',function(e){
    addLog('앨범 change 이벤트 발생, files: '+(e.target.files?e.target.files.length:0));
    var files=e.target.files;
    if(files){
      for(var i=0;i<files.length;i++)send(files[i]);
    }
    e.target.value='';
  });
}

/*========================================
  PC: PEER SETUP & QR
========================================*/
function initPeer(){
  return new Promise(function(ok,no){
    if(_peer&&_peer.id){ok(_peer.id);return}
    if(!_peerLoaded){
      onPeerReady(function(){
        if(typeof Peer==='undefined'){no(new Error('PeerJS 로드 실패. 새로고침 해보세요.'));return}
        _doInitPeer(ok,no);
      });
      return;
    }
    if(typeof Peer==='undefined'){no(new Error('PeerJS가 로드되지 않았습니다. 인터넷 연결을 확인하세요.'));return}
    _doInitPeer(ok,no);
  });
}
function _doInitPeer(ok,no){
    _peer=new Peer();
    _peer.on('open',function(id){S.peerId=id;ok(id)});
    _peer.on('error',function(e){no(new Error(e.type||e.message||'Peer 오류'))});
    _peer.on('connection',function(c){
      upd({peerSt:'connected'});
      var buf={chunks:[]};
      c.on('data',function(m){
        if(m.t==='s'){buf={name:m.name,mime:m.mime,tot:m.tot,chunks:[]}}
        else if(m.t==='c'){buf.chunks[m.i]=m.d}
        else if(m.t==='e'){
          try{
            var raw=atob(buf.chunks.join(''));
            var bytes=new Uint8Array(raw.length);
            for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
            var file=new File([bytes],buf.name,{type:buf.mime});
            upd({peerSt:'idle',qrOpen:false});
            doExtract([file]);
          }catch(e){upd({error:'파일 조립 실패: '+e.message,qrOpen:false})}
        }
      });
    });
}

function openQR(){
  initPeer().then(function(){
    S.qrOpen=true;S.peerSt='waiting';draw();
    setTimeout(renderQR,200);
  }).catch(function(e){
    upd({error:'❌ '+e.message});
  });
}

function renderQR(){
  var el=document.getElementById('qr-box');
  var urlEl=document.getElementById('qr-url');
  if(!el||!S.peerId)return;

  var base=location.href.split('?')[0];
  var url=base+'?connect='+S.peerId;
  el.innerHTML='';

  if(typeof QRCode!=='undefined'){
    try{
      new QRCode(el,{text:url,width:200,height:200,colorDark:'#2c2825',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    }catch(e){
      el.innerHTML='<div style="padding:16px;color:red;font-size:11px">QR 생성 실패<br>아래 URL을 복사하세요</div>';
    }
  }else{
    el.innerHTML='<div style="padding:16px;color:#999;font-size:11px">QR 라이브러리 로딩 중...<br>잠시 후 다시 시도하거나<br>아래 URL을 핸드폰에 직접 입력하세요</div>';
  }

  if(urlEl)urlEl.textContent=url;
}

/*========================================
  EXTRACT WORDS VIA CLAUDE API
========================================*/
function doExtract(files){
  upd({loading:true,error:null});

  var parts=[];
  var idx=0;

  function next(){
    if(idx>=files.length){callAPI(parts);return}
    var f=files[idx];idx++;
    toB64(f).then(function(b64){
      if(f.type==='application/pdf'){
        parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
      }else{
        parts.push({type:'image',source:{type:'base64',media_type:f.type,data:b64}});
      }
      next();
    }).catch(function(){
      upd({loading:false,error:'❌ 파일 읽기 실패'});
    });
  }
  next();
}

function callAPI(parts){
  parts.push({type:'text',text:
    '이 이미지/문서는 영어 어휘 학습 자료입니다.\n'+
    '각 단어를 JSON 배열로 추출하세요. 순수 JSON만 출력하세요 (마크다운 코드블록 금지).\n\n'+
    '형식: [{"word":"굵은 단어","phrase":"전체 표현","pos":"n/v/a/p/ad","def":"영영풀이","kor":"한국어뜻(≪≫안)","synonym":"유의어 또는 빈문자열"}]\n\n'+
    'Lesson 번호가 있으면 첫 요소로 {"_title":"LESSON XX"} 추가.\n'+
    '모든 단어 빠짐없이 추출하세요.'
  });

  if(!S.apiKey){
    upd({loading:false,error:'❌ API 키를 먼저 입력하세요 (상단 🔑 버튼)'});
    return;
  }

  var apiUrl='https://vocab-proxy.police6980.workers.dev';
  fetch(apiUrl,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':S.apiKey,
      'anthropic-version':'2023-06-01'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:8192,
      messages:[{role:'user',content:parts}]
    })
  })
  .then(function(resp){
    return resp.json().then(function(data){
      if(!resp.ok){
        var msg=data.error?data.error.message:'HTTP '+resp.status;
        throw new Error(msg);
      }
      return data;
    });
  })
  .then(function(data){
    var raw=(data.content||[]).map(function(c){return c.text||''}).join('');
    var m=raw.match(/\[[\s\S]*\]/);
    if(!m)throw new Error('JSON을 찾을 수 없습니다');
    var arr=JSON.parse(m[0]);
    var title='Vocabulary Worksheet';
    var words=[];var id=1;
    for(var i=0;i<arr.length;i++){
      var x=arr[i];
      if(x._title){title=x._title+' - Vocabulary Worksheet';continue}
      if(x.word){words.push({id:id++,word:x.word,phrase:x.phrase||'',pos:x.pos||'n',def:x.def||'',kor:x.kor||'',synonym:x.synonym||''})}
    }
    if(!words.length)throw new Error('추출된 단어가 없습니다');
    upd({title:title,words:words,view:'edit',loading:false,error:null});
  })
  .catch(function(e){
    console.error(e);
    upd({loading:false,error:'❌ '+e.message});
  });
}

/*========================================
  FILE HANDLERS
========================================*/
function handleFiles(fl){
  var ok=[];
  for(var i=0;i<fl.length;i++){
    if(fl[i].type==='application/pdf'||fl[i].type.indexOf('image/')===0)ok.push(fl[i]);
  }
  if(ok.length)doExtract(ok);
}

/*========================================
  ACTIONS
========================================*/
function upd(p){for(var k in p)S[k]=p[k];draw()}
function toggleB(k){S.blanks[k]=!S.blanks[k];draw()}
function doShuf(){S.words=shuffle(S.words);S.shuffled=true;draw()}
function resetOrd(){S.words.sort(function(a,b){return a.id-b.id});S.shuffled=false;draw()}
function addW(){
  var n=1;for(var i=0;i<S.words.length;i++){if(S.words[i].id>=n)n=S.words[i].id+1}
  S.words.push({id:n,word:'',phrase:'',pos:'n',def:'',kor:'',synonym:''});draw();
}
function delW(id){S.words=S.words.filter(function(w){return w.id!==id});draw()}
function loadDemo(){S.words=DEMO.slice();S.title='LESSON 11 - Vocabulary Worksheet';S.view='edit';draw()}

        '<td><input class="bld" data-id="'+ww.id+'" data-f="word" value="'+esc(ww.word)+'"></td>'+

        '<td><select data-id="'+ww.id+'" data-f="pos">'+['n','v','a','p','ad'].map(function(p){return'<option'+(ww.pos===p?' selected':'')+'>'+p+'</option>'}).join('')+'</select></td>'+
        '<td><input class="sml" data-id="'+ww.id+'" data-f="def" value="'+esc(ww.def)+'"></td>'+
        '<td><input data-id="'+ww.id+'" data-f="kor" value="'+esc(ww.kor)+'"></td>'+

        '<td><button class="xb" onclick="delW('+ww.id+')">×</button></td>';
      var inputs=tr.querySelectorAll('input,select');
      for(var j=0;j<inputs.length;j++){
        inputs[j].oninput=function(e){
          var id=parseInt(e.target.getAttribute('data-id'));
          var f=e.target.getAttribute('data-f');
          for(var k=0;k<S.words.length;k++){if(S.words[k].id===id){S.words[k][f]=e.target.value;break}}
        };
      }
      tb.appendChild(tr);
    })(w[i],i);
  }
}

/*-- Preview --*/
function drawPreview(el){
  var w=S.words,bl=S.blanks;
  var lb=[];if(bl.word)lb.push('영어 단어');if(bl.kor)lb.push('한국어 뜻');if(bl.def)lb.push('영영풀이');

  var rows='';
  for(var i=0;i<w.length;i++){
    var ww=w[i];
    var bw=Math.max(150,(ww.word||'').length*13);
    var ex;
    if(bl.word){
      if(ww.phrase&&ww.word&&ww.phrase.indexOf(ww.word)>=0){
        var idx=ww.phrase.indexOf(ww.word);
        ex=esc(ww.phrase.slice(0,idx))+'<span class="bl" style="width:'+bw+'px">&nbsp;</span>'+esc(ww.phrase.slice(idx+ww.word.length));

  var h='';

  h+='</div>';
  h+='<table class="pv"><thead><tr>';
  h+='<th style="width:24px">No.</th><th style="text-align:left;min-width:150px">Expression</th><th style="width:24px">품사</th>';
  h+='<th style="text-align:left">Definition</th><th style="min-width:105px">한국어 뜻</th><th style="width:60px">Synonym</th>';
  h+='</tr></thead><tbody>'+rows+'</tbody></table></div>';

<script>
// QRCode.js 로드 - 여러 CDN 순차 시도
(function(){
  var urls=[
    'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js',
    'https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js'
  ];
  var i=0;
  function tryNext(){
    if(i>=urls.length){console.warn('⚠️ 모든 QRCode CDN 실패');return}
    var s=document.createElement('script');
    s.src=urls[i];i++;
    s.onload=function(){console.log('✅ QRCode.js loaded from '+s.src)};
    s.onerror=function(){console.warn('❌ QRCode 실패: '+s.src);tryNext()};
    document.head.appendChild(s);
  }
  tryNext();
})();
// PeerJS 로드 - 여러 CDN 순차 시도
(function(){
  var urls=[
    'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js',
    'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js'
  ];
  var i=0;
  function tryNext(){
    if(i>=urls.length){console.warn('⚠️ 모든 PeerJS CDN 실패');return}
    var s=document.createElement('script');
    s.src=urls[i];i++;
    s.onload=function(){console.log('✅ PeerJS loaded from '+s.src);if(typeof _peerDone==='function')_peerDone()};
    s.onerror=function(){console.warn('❌ PeerJS 실패: '+s.src);tryNext()};
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
