<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Worksheet Maker</title>
<style>
:root{--bg:#f7f5f1;--card:#fff;--bdr:#ddd8d0;--txt:#2c2825;--mut:#8a8580;--acc:#c8a96e;--dk:#2c2825}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* Header */
.hdr{background:var(--dk);color:#f5f0e8;padding:14px 20px;border-bottom:3px solid var(--acc);display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:20px;letter-spacing:2px;font-weight:700}
.hdr small{font-size:11px;color:#a09888;display:block;margin-top:2px}
.wrap{max-width:1100px;margin:0 auto;padding:20px 14px}

/* Buttons */
.b{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;font-family:inherit}
.b-dk{background:var(--dk);color:#f5f0e8}.b-dk:hover{background:#1a1815}
.b-gd{background:var(--acc);color:var(--dk);font-weight:600}.b-gd:hover{background:#b8994e}
.b-lt{background:#f0ece6;color:#4a4540;border:1px solid var(--bdr)}.b-lt:hover{background:#e8e3db}
.b-on{background:var(--dk);color:#f5f0e8;border:1px solid var(--dk)}
.b-off{background:#f0ece6;color:#4a4540;border:1px solid var(--bdr)}

/* Upload */
.upload-box{max-width:600px;margin:30px auto;text-align:center}
.drop{border:2.5px dashed var(--bdr);border-radius:14px;padding:40px 20px;cursor:pointer;background:#fdfcfa;transition:all .15s}
.drop:hover,.drop.over{border-color:var(--acc);background:#faf6ee}
.drop h2{font-size:17px;margin:8px 0 4px}
.drop p{font-size:13px;color:#6a6560}
.methods{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.meth{padding:12px;border-radius:10px;background:#f8f6f2;border:1px solid #e8e4de;text-align:center;min-width:100px;flex:1}
.meth.blue{border-color:#4a9eff;background:#f0f7ff;cursor:pointer}
.meth .mi{font-size:22px;margin-bottom:3px}
.meth .ml{font-size:11px;font-weight:600}
.meth .md{font-size:9px;color:var(--mut);margin-top:1px}
.err{margin-top:12px;padding:10px 14px;background:#fef2f2;border:1px solid #fcc;border-radius:6px;color:#900;font-size:12px;text-align:center}

/* Toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:10px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;margin-bottom:12px}
.toolbar .lbl{font-size:10px;color:var(--mut);letter-spacing:1px;margin-right:2px}
.sep{width:1px;height:18px;background:var(--bdr);margin:0 3px}

/* Edit Table */
.ecard{background:var(--card);border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.et{width:100%;border-collapse:collapse}
.et th{padding:8px 5px;font-size:10px;color:var(--mut);font-weight:500;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap}
.et td{padding:6px 4px;border-bottom:1px solid #eee}
.et input{width:100%;border:none;background:none;outline:none;font-size:12px;padding:3px 0;color:var(--txt)}
.et input.bld{font-weight:700}
.et input.ita{font-style:italic;color:var(--mut)}
.et input.sml{font-size:11px}
.et select{border:none;background:none;font-size:11px;color:var(--mut);cursor:pointer;outline:none}
.xb{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 2px}.xb:hover{color:#c44}
.add-r{padding:10px;border-top:1px solid #eee}

/* Preview */
.pvw{background:var(--card);padding:24px;border:1px solid var(--bdr);border-radius:6px;max-width:960px;margin:0 auto}
.pvt{text-align:center;margin-bottom:14px}
.pvt h2{font-size:16px;font-weight:700}
.pvt .nl{font-size:12px;color:#444;margin-top:8px}
.pvt .ins{font-size:11px;color:#555;margin-top:4px}
.pv{width:100%;border-collapse:collapse}
.pv th{padding:6px 4px;font-size:10px;font-weight:700;text-align:center;border:1.5px solid #999;background:#f0f0f0}
.pv td{border:1px solid #bbb;vertical-align:middle}
.pv .cn{padding:6px 3px;text-align:center;color:#999;font-size:10px;width:24px}
.pv .ce{padding:12px 5px;height:44px;font-size:12px}
.pv .cp{padding:6px 3px;text-align:center;font-style:italic;color:#999;font-size:10px;width:24px}
.pv .cd{padding:12px 5px;font-size:10px;line-height:1.5;height:44px}
.pv .ck{padding:12px 5px;text-align:center;height:44px;font-size:12px;min-width:105px}
.pv .cs{padding:6px 3px;text-align:center;font-style:italic;color:#999;font-size:10px;width:60px}
.bl{display:inline-block;border-bottom:2.5px solid #333;min-height:26px;vertical-align:bottom}

/* QR Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center}
.mdl{background:#fff;border-radius:14px;padding:24px;text-align:center;max-width:380px;width:92%;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.mdl h3{font-size:16px;margin-bottom:4px}
.mdl .ds{font-size:12px;color:#666;margin-bottom:14px;line-height:1.5}
#qr-box{display:inline-block;padding:8px;background:#fff;border-radius:6px;margin-bottom:10px;min-width:200px;min-height:200px}
.sbdg{display:inline-block;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500}
.sbdg.w{background:#fef9e7;color:#8a6d00}
.sbdg.g{background:#e8f8e8;color:#2d7a2d}
.ucopy{margin-top:8px;padding:7px 10px;background:#f5f3f0;border-radius:5px;font-size:9px;color:#888;word-break:break-all;cursor:pointer;border:1px solid #e8e4de}
.ucopy:active{background:#e8f8e8}

/* Mobile */
.mobp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#e8f0ff,#f0f7ff)}
.mobc{background:#fff;border-radius:18px;padding:26px 20px;text-align:center;max-width:350px;width:100%;box-shadow:0 6px 24px rgba(0,0,0,.1)}
.mobc h2{font-size:18px;margin-bottom:6px}
.mobc p{font-size:13px;color:#666;margin-bottom:18px}
.mbtn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;font-family:inherit}
.mbtn.cam{background:#4a9eff;color:#fff}
.mbtn.gal{background:#f0f0f0;color:#333}
.mbtn.solo{background:#c8a96e;color:#2c2825}
.mst{margin-top:12px;padding:10px;border-radius:8px;font-size:13px}
.mst.w{background:#fef9e7;color:#8a6d00}
.mst.g{background:#e8f8e8;color:#2d7a2d}
.mst.s{background:#e8f0ff;color:#2a5aaa}
.mst.d{background:#e8f8e8;color:#2d7a2d}
.mst.e{background:#fef2f2;color:#9b2c2c}
.mimg{max-width:100%;max-height:160px;border-radius:6px;margin-top:8px}
.mlog{margin-top:8px;padding:8px;background:#f8f8f8;border-radius:6px;font-size:10px;color:#888;text-align:left;max-height:120px;overflow-y:auto;font-family:monospace}

.footer{text-align:center;padding:20px 0 8px;font-size:9px;color:#c0b8a8;letter-spacing:2px}

/* Phrase word picker */
.pw-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:3px;padding:2px 0}
.pw{display:inline-block;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:12px;border:1.5px solid transparent;transition:all .12s;user-select:none}
.pw:hover{background:#f0ece6;border-color:var(--bdr)}
.pw-sel{background:var(--acc);color:white;font-weight:700;border-color:var(--acc)}
.pw-sel:hover{background:#b8994e}

@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .8s linear infinite;display:inline-block}
@media print{
  body{background:#fff!important}.no-print{display:none!important}
  .pvw{border:none;padding:0}
  .pv .ce,.pv .cd,.pv .ck{height:48px;padding:14px 5px}
  .bl{min-height:28px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/*========================================
  DEMO DATA (오프라인 테스트용)
========================================*/
var DEMO=[
  {id:21,word:"district",blank:"district",phrase:"business district",pos:"n",def:"an area of a country or town that has particular features",kor:"지구",synonym:"area"},
  {id:22,word:"property",blank:"property",phrase:"intellectual property",pos:"n",def:"a thing or things that are owned by somebody",kor:"재산",synonym:"possession"},
  {id:23,word:"information",blank:"information",phrase:"accurate information",pos:"a",def:"correct or true in every detail",kor:"정확한",synonym:"correct"},
  {id:24,word:"plague",blank:"plague",phrase:"plague outbreak",pos:"n",def:"a disease that spreads quickly and kills many people",kor:"전염병",synonym:"epidemic"},
  {id:25,word:"germs",blank:"germs",phrase:"spread germs",pos:"n",def:"very small living things that can cause infection and disease",kor:"세균",synonym:"bacteria"},
  {id:26,word:"cramped",blank:"cramped",phrase:"cramped kitchen",pos:"a",def:"not having enough space",kor:"비좁은",synonym:"tight"},
  {id:27,word:"rage",blank:"rage",phrase:"forest fires rage",pos:"v",def:"(of an illness, a fire, etc.) to spread very quickly",kor:"급속히 번지다",synonym:""},
  {id:28,word:"attractive",blank:"attractive",phrase:"attractive woman",pos:"a",def:"very pleasing in appearance or sound",kor:"매력적인",synonym:"charming"},
  {id:29,word:"measure",blank:"measure",phrase:"safety measure",pos:"n",def:"a way of achieving something, or a method for dealing with a situation",kor:"조치",synonym:"action"},
  {id:30,word:"obvious",blank:"obvious",phrase:"obvious choice",pos:"a",def:"easy to see or notice",kor:"당연한",synonym:"clear"},
  {id:31,word:"opposite",blank:"opposite",phrase:"opposite direction",pos:"a",def:"located at the other end, side, or corner of something",kor:"반대의",synonym:"reverse"},
  {id:32,word:"triumph",blank:"triumph",phrase:"triumph over evil",pos:"v",def:"to achieve victory, especially in a long or difficult contest",kor:"승리하다",synonym:"win"},
  {id:33,word:"thrill",blank:"thrill",phrase:"thrill of victory",pos:"n",def:"a feeling of great excitement or happiness",kor:"짜릿함",synonym:"excitement"},
  {id:34,word:"Revolution",blank:"Revolution",phrase:"Industrial Revolution",pos:"n",def:"a sudden and great change; an attempt, by a large number of people, to change the government of a country, especially by violent action",kor:"혁명",synonym:""},
  {id:35,word:"revolt",blank:"revolt",phrase:"revolt against the government",pos:"v",def:"to fight in a violent way against the rule of a leader or government",kor:"반란을 일으키다",synonym:"rebel"},
  {id:36,word:"royalty",blank:"royalty",phrase:"king and royalty",pos:"n",def:"members of a royal family",kor:"왕족",synonym:""},
  {id:37,word:"execution",blank:"execution",phrase:"public execution",pos:"n",def:"the act of killing somebody as a legal punishment",kor:"처형",synonym:""},
  {id:38,word:"alternate",blank:"alternate",phrase:"alternate work and rest",pos:"v",def:"to place or do different things so that one follows the other in a repeated series",kor:"번갈아 하다",synonym:"take turns"},
  {id:39,word:"intense",blank:"intense",phrase:"intense exercise",pos:"a",def:"very great in degree; very strong",kor:"격렬한",synonym:"extreme"},
  {id:40,word:"moderate",blank:"moderate",phrase:"moderate exercise",pos:"a",def:"neither too much nor too little",kor:"적당한",synonym:"modest"},
];

/*========================================
  STATE
========================================*/
var S={
  view:'upload', words:[], title:'Vocabulary Worksheet',
  blanks:{word:true,kor:true,def:false},
  wordBank:true,
  loading:false, error:null, shuffled:false,
  qrOpen:false, peerSt:'idle', peerId:null,
  apiKey:localStorage.getItem('vocabApiKey')||''
};
var _peer=null;

/*========================================
  UTILS
========================================*/
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=b[i];b[i]=b[j];b[j]=t}return b}
function toB64(f){return new Promise(function(ok,no){var r=new FileReader();r.onload=function(){ok(r.result.split(',')[1])};r.onerror=no;r.readAsDataURL(f)})}

// Detect mobile
function isMobile(){return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)}

/*========================================
  MOBILE MODE CHECK
========================================*/
var WORKER_URL='https://vocab-proxy.police6980.workers.dev';
var _conn=new URLSearchParams(location.search).get('room');

if(_conn){
  document.addEventListener('DOMContentLoaded',function(){bootMobile(_conn)});
}else{
  // PC or standalone mobile: paste listener
  window.addEventListener('paste',function(e){
    if(S.view!=='upload'||S.loading)return;
    var fs=[];var items=e.clipboardData?e.clipboardData.items:[];
    for(var i=0;i<items.length;i++){if(items[i].kind==='file'){var f=items[i].getAsFile();if(f)fs.push(f)}}
    if(fs.length){e.preventDefault();handleFiles(fs)}
  });
  document.addEventListener('DOMContentLoaded',draw);
}

/*========================================
  MOBILE SENDER PAGE (QR로 접속 시)
========================================*/
function bootMobile(roomId){
  var app=document.getElementById('app');
  app.innerHTML='<div class="mobp"><div class="mobc">'+
    '<div style="font-size:42px;margin-bottom:8px">📸</div>'+
    '<h2>사진 전송</h2><p>촬영하면 PC로 바로 전송됩니다</p>'+
    '<input type="file" id="mc" accept="image/*" capture="environment" style="display:none">'+
    '<input type="file" id="mg" accept="image/*,application/pdf" multiple style="display:none">'+
    '<button class="mbtn cam" id="camBtn">📷 카메라 촬영</button>'+
    '<button class="mbtn gal" id="galBtn">🖼️ 앨범 선택</button>'+
    '<div id="ms" class="mst g">✅ 준비 완료! 사진을 찍으세요</div>'+
    '<div id="mp"></div>'+
  '</div></div>';

  function st(){return document.getElementById('ms')}

  function send(file){
    st().className='mst s';st().textContent='📤 전송 중...';
    if(file.type.startsWith('image/')){
      document.getElementById('mp').innerHTML='<img src="'+URL.createObjectURL(file)+'" class="mimg">';
    }
    var reader=new FileReader();
    reader.onload=function(){
      var b64=reader.result;
      var payload=JSON.stringify({name:file.name,mime:file.type,data:b64});
      fetch(WORKER_URL+'/upload/'+roomId,{
        method:'POST',
        body:payload
      }).then(function(r){
        if(r.ok){
          st().className='mst d';st().textContent='✅ 전송 완료! 추가 전송도 가능합니다';
        }else{
          st().className='mst e';st().textContent='❌ 전송 실패 ('+r.status+')';
        }
      }).catch(function(e){
        st().className='mst e';st().textContent='❌ 전송 실패: '+e.message;
      });
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('camBtn').onclick=function(){document.getElementById('mc').click()};
  document.getElementById('galBtn').onclick=function(){document.getElementById('mg').click()};
  document.getElementById('mc').addEventListener('change',function(e){
    if(e.target.files&&e.target.files[0])send(e.target.files[0]);
    e.target.value='';
  });
  document.getElementById('mg').addEventListener('change',function(e){
    if(e.target.files){for(var i=0;i<e.target.files.length;i++)send(e.target.files[i])}
    e.target.value='';
  });
}

/*========================================
  PC: ROOM & QR (Worker Relay)
========================================*/
var _roomId=null;
var _polling=false;

function generateRoom(){
  return Math.random().toString(36).substr(2,8);
}

function startPolling(){
  if(_polling)return;
  _polling=true;
  function poll(){
    if(!_polling)return;
    fetch(WORKER_URL+'/poll/'+_roomId)
      .then(function(r){return r.json()})
      .then(function(data){
        if(data.waiting){
          setTimeout(poll,2000);
        }else if(data.data){
          // Photo received!
          _polling=false;
          var b64=data.data;
          var name=data.name||'photo.jpg';
          var mime=data.mime||'image/jpeg';
          // Convert data URL to File
          var raw=atob(b64.split(',')[1]);
          var bytes=new Uint8Array(raw.length);
          for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
          var file=new File([bytes],name,{type:mime});
          upd({qrOpen:false});
          doExtract([file]);
        }
      })
      .catch(function(){setTimeout(poll,3000)});
  }
  poll();
}

function openQR(){
  _roomId=generateRoom();
  S.qrOpen=true;S.peerSt='waiting';draw();
  setTimeout(renderQR,200);
  startPolling();
}

function renderQR(){
  var el=document.getElementById('qr-box');
  var urlEl=document.getElementById('qr-url');
  if(!el||!_roomId)return;

  var base=location.href.split('?')[0];
  var url=base+'?room='+_roomId;
  el.innerHTML='';

  if(typeof QRCode!=='undefined'){
    try{
      new QRCode(el,{text:url,width:200,height:200,colorDark:'#2c2825',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    }catch(e){
      el.innerHTML='<div style="padding:16px;color:red;font-size:11px">QR 생성 실패<br>아래 URL을 복사하세요</div>';
    }
  }else{
    el.innerHTML='<div style="padding:16px;color:#999;font-size:11px">QR 라이브러리 로딩 중...</div>';
  }

  if(urlEl)urlEl.textContent=url;
}

/*========================================
  EXTRACT WORDS VIA CLAUDE API
========================================*/
function doExtract(files){
  upd({loading:true,error:null});

  var parts=[];
  var idx=0;

  function next(){
    if(idx>=files.length){callAPI(parts);return}
    var f=files[idx];idx++;
    toB64(f).then(function(b64){
      if(f.type==='application/pdf'){
        parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
      }else{
        parts.push({type:'image',source:{type:'base64',media_type:f.type,data:b64}});
      }
      next();
    }).catch(function(){
      upd({loading:false,error:'❌ 파일 읽기 실패'});
    });
  }
  next();
}

function callAPI(parts){
  parts.push({type:'text',text:
    '이 이미지/문서는 영어 어휘 학습 자료입니다.\n'+
    '각 단어를 JSON 배열로 추출하세요. 순수 JSON만 출력하세요 (마크다운 코드블록 금지).\n\n'+
    '형식: [{"word":"굵은 단어","phrase":"전체 표현","pos":"n/v/a/p/ad","def":"영영풀이","kor":"한국어뜻(≪≫안)","synonym":"유의어 또는 빈문자열"}]\n\n'+
    'Lesson 번호가 있으면 첫 요소로 {"_title":"LESSON XX"} 추가.\n'+
    '모든 단어 빠짐없이 추출하세요.'
  });

  if(!S.apiKey){
    upd({loading:false,error:'❌ API 키를 먼저 입력하세요 (상단 🔑 버튼)'});
    return;
  }

  var apiUrl='https://vocab-proxy.police6980.workers.dev';
  var models=['claude-haiku-4-5-20251001','claude-sonnet-4-20250514'];
  var bodyBase={max_tokens:8192,messages:[{role:'user',content:parts}]};

  function tryCall(modelIdx,attempt){
    var model=models[modelIdx];
    var maxAttempt=3;
    upd({error:null});
    if(attempt>0){
      var el=document.querySelector('.err')||document.querySelector('.upload-box');
      if(el){
        var info=document.createElement('div');
        info.style.cssText='color:var(--acc);font-size:13px;text-align:center;padding:6px';
        info.textContent='⏳ 재시도 중... ('+model+', '+(attempt+1)+'/'+maxAttempt+'회)';
        el.parentNode&&el.parentNode.insertBefore(info,el);
      }
    }

    var body=JSON.parse(JSON.stringify(bodyBase));
    body.model=model;

    fetch(apiUrl,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.apiKey.replace(/[^\x20-\x7E]/g,'').trim(),
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify(body)
    })
    .then(function(resp){
      return resp.json().then(function(data){
        if(!resp.ok){
          var msg=data.error?data.error.message:'HTTP '+resp.status;
          // Overloaded or rate limit → retry
          if((resp.status===529||resp.status===429||msg.toLowerCase().indexOf('overload')>=0)&&attempt<maxAttempt-1){
            var delay=3000*(attempt+1);
            setTimeout(function(){tryCall(modelIdx,attempt+1)},delay);
            return null;
          }
          // All retries failed for this model → try next model
          if((resp.status===529||resp.status===429||msg.toLowerCase().indexOf('overload')>=0)&&modelIdx<models.length-1){
            setTimeout(function(){tryCall(modelIdx+1,0)},2000);
            return null;
          }
          throw new Error(msg);
        }
        return data;
      });
    })
    .then(function(data){
      if(!data)return; // retry in progress
      var raw=(data.content||[]).map(function(c){return c.text||''}).join('');
      var m=raw.match(/\[[\s\S]*\]/);
      if(!m)throw new Error('JSON을 찾을 수 없습니다');
      var arr=JSON.parse(m[0]);
      var title='Vocabulary Worksheet';
      var words=[];var id=1;
      for(var i=0;i<arr.length;i++){
        var x=arr[i];
        if(x._title){title=x._title+' - Vocabulary Worksheet';continue}
        if(x.word){words.push({id:id++,word:x.word,blank:x.word,phrase:x.phrase||'',pos:x.pos||'n',def:x.def||'',kor:x.kor||'',synonym:x.synonym||''})}
      }
      if(!words.length)throw new Error('추출된 단어가 없습니다');
      upd({title:title,words:words,view:'edit',loading:false,error:null});
    })
    .catch(function(e){
      console.error(e);
      upd({loading:false,error:'❌ '+e.message});
    });
  }

  tryCall(0,0);
}

function handleFiles(fl){
  var ok=[];
  for(var i=0;i<fl.length;i++){
    if(fl[i].type==='application/pdf'||fl[i].type.indexOf('image/')===0)ok.push(fl[i]);
  }
  if(ok.length)doExtract(ok);
}

function resetOrd(){S.words.sort(function(a,b){return a.id-b.id});S.shuffled=false;draw()}
function addW(){

function delW(id){S.words=S.words.filter(function(w){return w.id!==id});draw()}

// Flush all input values to S.words before switching views
function flushInputs(){
  var inputs=document.querySelectorAll('#eb input[data-f],#eb select[data-f]');
  for(var i=0;i<inputs.length;i++){
    var id=parseInt(inputs[i].getAttribute('data-id'));
    var f=inputs[i].getAttribute('data-f');
    for(var k=0;k<S.words.length;k++){
      if(S.words[k].id===id){
        S.words[k][f]=inputs[i].value;
        if(f==='blank')S.words[k].word=inputs[i].value;
        break;
      }
    }
  }
  var ti=document.getElementById('ti');
  if(ti)S.title=ti.value;
  console.log('flushInputs done. Sample:',S.words[0]?JSON.stringify({word:S.words[0].word,blank:S.words[0].blank}):'none');
}

function goPreview(){flushInputs();S.view='preview';draw()}
function setBlank(id,val){
  flushInputs();
  for(var k=0;k<S.words.length;k++){
    if(S.words[k].id===id){S.words[k].blank=val;S.words[k].word=val;break}
  }
  draw();
}

function editPhrase(id){
  var wrap=document.getElementById('pw-'+id);
  if(!wrap)return;
  var curPhrase='';
  for(var k=0;k<S.words.length;k++){if(S.words[k].id===id){curPhrase=S.words[k].phrase;break}}
  wrap.innerHTML='<input class="pw-inp" value="'+curPhrase.replace(/"/g,'&quot;')+'" data-id="'+id+'" style="width:calc(100% - 60px);padding:4px 6px;font-size:12px;border:2px solid var(--acc);border-radius:4px;outline:none">'+
    '<button onclick="confirmPhrase('+id+')" style="margin-left:4px;padding:3px 10px;font-size:11px;border:none;background:var(--acc);color:white;border-radius:4px;cursor:pointer;font-weight:600">확정</button>';
  var inp=wrap.querySelector('.pw-inp');
  if(inp){inp.focus();inp.select();inp.onkeydown=function(ev){if(ev.key==="Enter")confirmPhrase(id)};}
}

function confirmPhrase(id){
  var inp=document.querySelector('.pw-inp[data-id="'+id+'"]');
  if(!inp)return;
  var newPhrase=inp.value.trim();
  flushInputs();
  for(var k=0;k<S.words.length;k++){
    if(S.words[k].id===id){
      S.words[k].phrase=newPhrase;
      var newWords=newPhrase.split(/\s+/).filter(function(x){return x});
      var found=false;
      for(var n=0;n<newWords.length;n++){
        if(newWords[n].toLowerCase()===S.words[k].blank.toLowerCase()){found=true;break}
      }
      if(!found&&newWords.length>0)S.words[k].blank=newWords[0];
      S.words[k].word=S.words[k].blank;
      break;
    }
  }
  draw();
}

/*-- Preview --*/
function findBlankIdx(ph,blk){
  if(!ph||!blk)return -1;
  var lower=ph.toLowerCase();
  var blower=blk.toLowerCase();
  var idx=lower.indexOf(blower);
  if(idx>=0)return idx;
  var words=ph.split(/\s+/);
  var pos=0;
  for(var w2=0;w2<words.length;w2++){
    if(words[w2].toLowerCase()===blower)return pos;
    pos+=words[w2].length+1;
  }
  return -1;
}

function drawPreview(el){
  var w=S.words,bl=S.blanks;
  var lb=[];if(bl.word)lb.push('영어 단어');if(bl.kor)lb.push('한국어 뜻');if(bl.def)lb.push('영영풀이');

  var rows='';
  for(var i=0;i<w.length;i++){
    var ww=w[i];
    var blankWord=ww.blank||ww.word;
    var bw=Math.max(150,(blankWord||'').length*13);
    var ex;
    var phrase=ww.phrase||'';
    var matchIdx=findBlankIdx(phrase,blankWord);
    
    if(bl.word){
      if(matchIdx>=0){
        ex=esc(phrase.slice(0,matchIdx))+'<span class="bl" style="width:'+bw+'px">&nbsp;</span>'+esc(phrase.slice(matchIdx+blankWord.length));
      }else{
        ex='<span class="bl" style="width:'+bw+'px">&nbsp;</span> '+esc(phrase);
      }
    }else{
      if(matchIdx>=0){
        ex=esc(phrase.slice(0,matchIdx))+'<b>'+esc(phrase.slice(matchIdx,matchIdx+blankWord.length))+'</b>'+esc(phrase.slice(matchIdx+blankWord.length));
      }else{
        ex='<b>'+esc(blankWord)+'</b> '+esc(phrase);
      }
    }
    var df=bl.def?'<span class="bl" style="width:92%">&nbsp;</span>':esc(ww.def);
    var kr=bl.kor?'<span class="bl" style="width:110px">&nbsp;</span>':esc(ww.kor);
    rows+='<tr><td class="cn">'+(i+1)+'</td><td class="ce">'+ex+'</td><td class="cp">'+esc(ww.pos)+'</td><td class="cd">'+df+'</td><td class="ck">'+kr+'</td><td class="cs">'+esc(ww.synonym)+'</td></tr>';
  }

  var h='';
  h+='<div class="no-print" style="display:flex;justify-content:space-between;margin-bottom:12px">';
  h+='<button class="b b-lt" onclick="upd({view:\'edit\'})">← 편집</button>';

  if(lb.length)h+='<div class="ins">★ 빈칸에 알맞은 '+lb.join('과 ')+'을(를) 쓰시오.</div>';
  h+='</div>';
  h+='<table class="pv"><thead><tr>';
  h+='<th style="width:24px">No.</th><th style="text-align:left;min-width:150px">Expression</th><th style="width:24px">품사</th>';
  h+='<th style="text-align:left">Definition</th><th style="min-width:105px">한국어 뜻</th><th style="width:60px">Synonym</th>';
  h+='</tr></thead><tbody>'+rows+'</tbody></table>';

  // Word Bank - 빈칸 단어들을 섞어서 보기로 제공
  if(S.wordBank&&bl.word){
    var bankWords=[];
    for(var j=0;j<w.length;j++){
      var bw2=w[j].blank||w[j].word;
      if(bw2)bankWords.push(bw2);
    }
    bankWords=shuffle(bankWords);
    h+='<div style="margin-top:16px;padding:12px 16px;border:2px solid #999;border-radius:8px;background:#fafafa">';
    h+='<div style="font-size:11px;font-weight:700;color:#666;margin-bottom:8px;letter-spacing:1px">WORD BANK</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:10px 18px;font-size:13px;font-family:Georgia,serif">';
    for(var j=0;j<bankWords.length;j++){
      h+='<span>'+esc(bankWords[j])+'</span>';
    }
    h+='</div></div>';
  }

  h+='</div>';
  el.innerHTML=h;
}
</script>

<script>
// QRCode.js 로드 - 여러 CDN 순차 시도
(function(){
  var urls=[
    'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js',
    'https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js'
  ];
  var i=0;
  function tryNext(){
    if(i>=urls.length){console.warn('⚠️ 모든 QRCode CDN 실패');return}
    var s=document.createElement('script');
    s.src=urls[i];i++;
    s.onload=function(){console.log('✅ QRCode.js loaded from '+s.src)};
    s.onerror=function(){console.warn('❌ QRCode 실패: '+s.src);tryNext()};
    document.head.appendChild(s);
  }
  tryNext();
})();
// PeerJS removed - using Worker relay
</script>
